name: Publish issue

on:
  push:
    branches: [main]
    paths:
      - 'issues/*.json'
  workflow_dispatch:
    inputs:
      issue_file:
        description: 'Path to the issue JSON (e.g. issues/13.json)'
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pick the issue file
        id: pick
        run: |
          if [ -n "${{ github.event.inputs.issue_file }}" ]; then
            FILE="${{ github.event.inputs.issue_file }}"
          else
            FILE=$(ls issues/*.json | sort -V | tail -n1)
          fi
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then echo "No issue JSON found."; exit 1; fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "Building $FILE"

      - name: Build the deploy files
        run: node scripts/build-issue.js "${{ steps.pick.outputs.file }}"

      - name: Commit and push
        run: |
          git config user.name  "Brad Lieberman"
          git config user.email "brad@liebermancenter.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed."
            exit 0
          fi
          ISSUE=$(node -e "process.stdout.write(String(require('./'+process.argv[1]).issue_number))" "${{ steps.pick.outputs.file }}")
          TITLE=$(node -e "process.stdout.write(require('./'+process.argv[1]).title.slice(0,72))" "${{ steps.pick.outputs.file }}")
          git commit -m "Issue No. ${ISSUE}: ${TITLE}"
          git push origin HEAD:main
